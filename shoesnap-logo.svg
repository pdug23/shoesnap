<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="shoeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Shoe icon (simplified running shoe silhouette) -->
  <g transform="translate(12, 25) scale(0.65)">
    <!-- Sole -->
    <path d="M10,85 Q5,82 8,75 L25,70 Q60,65 100,63 L130,62 Q145,62 150,65 L152,70 Q153,75 148,80 L140,83 Q120,87 80,88 Q40,89 20,87 Z"
          fill="url(#shoeGrad)" opacity="0.9"/>
    <!-- Upper -->
    <path d="M25,70 Q30,45 50,35 Q65,28 85,30 L105,33 Q120,36 130,40 L140,48 Q145,55 142,62 L130,62 Q100,63 60,65 Z"
          fill="url(#shoeGrad)" opacity="0.75"/>
    <!-- Swoosh-like detail -->
    <path d="M40,60 Q65,48 95,45 Q115,44 135,50"
          fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <!-- Collar -->
    <path d="M48,38 Q52,30 62,28 Q70,27 78,30"
          fill="none" stroke="url(#shoeGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Lace dots -->
    <circle cx="60" cy="36" r="2" fill="white" opacity="0.5"/>
    <circle cx="72" cy="33" r="2" fill="white" opacity="0.5"/>
    <circle cx="84" cy="34" r="2" fill="white" opacity="0.5"/>
  </g>

  <!-- "ShoeSnap" text -->
  <text x="120" y="72" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="48" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#3b82f6">Shoe</tspan><tspan fill="#8b5cf6">Snap</tspan>
  </text>

  <!-- Tagline -->
  <text x="122" y="92" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" fill="#888888" letter-spacing="0.5">
    shoe intelligence workbench
  </text>
</svg>
